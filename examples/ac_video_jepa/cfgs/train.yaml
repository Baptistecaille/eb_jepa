logging:
  log_wandb: true
  wandb_group:
  wandb_sweep:
  log_every: 10
  exp_suffix: 26-01-15
  save_every_n_epochs: 1
  tqdm_silent: false
meta:
  model_folder:
  load_model: true
  enable_plan_eval: true
  eval_every_itr: -1
  light_eval_freq: 50
  seed: 1
data:
  env_name: two_rooms
  # Training-specific overrides (base config in eb_jepa/datasets/two_rooms/data_config.yaml)
  batch_size: 384
  num_workers: 16
  pin_mem: true
  persistent_workers: true
training:
  use_amp: true
  dtype: auto
model:
  compile: true
  compile_mode: reduce-overhead
  dobs: 2
  henc: 32
  hpre: 32
  dstc: 32
  nsteps: 8
  encoder_architecture: impala # impala | cortical
  use_spatial_neighborhood: true
  use_global_memory: true
  use_top_down_feedback: true
  use_surprise_gate: false
  latent_dim: 32
  grid_h: 5
  grid_w: 5
  patch_size: 13
  action_embed_dim: 64
  memory_dim: 256
  train_rollout: last # last | all
  encoder_skip_connections: True
  predictor_skip_connections: True
  regularizer:
    cov_coeff: 8
    std_coeff: 16 # 4.0
    sim_coeff_t: 12 # 0.75 in PLDM
    idm_coeff: 1
    first_t_only: False
    spatial_as_samples: false
    use_proj: false
    idm_after_proj: false
    sim_t_after_proj: false
optim:
  epochs: 12
  lr: 0.001
  grad_clip_enc: 2.0
  grad_clip_pred: 2.0
  weight_decay: 1.e-5
eval:
  plan_cfg_path: examples/ac_video_jepa/cfgs/planning_mppi.yaml # eb_jepa/planning_mppi.yaml
  eval_cfg_path: examples/ac_video_jepa/cfgs/eval.yaml
surprise:
  enabled: true
  metric: normalized_l2
  eps: 1.0e-8
  log_every: 100
  save_heatmaps_every: 500
  save_npz_every: 1000
  max_npz_batches: 16
  log_to_wandb: true
  log_to_local: true
surprise_gate:
  alpha: 10.0
  threshold_momentum: 0.99
  adaptive_threshold: true
  initial_threshold: 0.05
  min_gate: 0.05
  max_gate: 1.0
  detach_surprise: true

# --- Parameters used when running with --full-sweep
# By default, only the parameters specified above are used
sweep:
  # Sweep grid for AC video JEPA hyperparameter search
  param_grid:
    model.regularizer.cov_coeff: [8, 12]
    model.regularizer.std_coeff: [8, 16]
    model.regularizer.sim_coeff_t: [8, 12, 16]
    model.regularizer.idm_coeff: [1, 2]
    meta.seed: [1, 1000, 10000]
